<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="mintIconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4F3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:1" />
    </linearGradient>
    <filter id="mintGloss">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Main icon: coral-to-mint gradient -->
  <rect x="32" y="32" width="192" height="192" rx="44" ry="44" fill="url(#mintIconGradient)"/>

  <!-- Gloss overlay -->
  <ellipse cx="92" cy="76" rx="56" ry="44" fill="white" opacity="0.24" filter="url(#mintGloss)"/>

  <!-- Large K letter -->
  <text x="128" y="180" font-family="Syne, sans-serif" font-size="160" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-0.04em">K</text>
</svg>
